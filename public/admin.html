<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Access</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main id="loginView" class="container" style="max-width:450px;padding-top:10vh">
    <div class="card">
      <h1>Admin Access — Secure Login Required</h1>
      <form id="loginForm">
        <input class="input" type="password" name="password" required placeholder="Password" />
        <button style="margin-top:.6rem;width:100%">Login</button>
      </form>
      <p id="loginError" class="muted"></p>
    </div>
  </main>

  <div id="adminView" class="admin-wrap hidden">
    <aside class="sidebar">
      <h2>Admin Panel</h2>
      <button data-tab="dashboard">Dashboard</button>
      <button data-tab="products">Products</button>
      <button data-tab="orders">Orders</button>
      <button data-tab="crm">CRM</button>
      <button data-tab="revenue">Revenue</button>
      <button data-tab="taxes">Taxes</button>
      <button data-tab="compliance">Compliance</button>
      <button data-tab="giving">Tithe & Offering</button>
      <button data-tab="editor">Website Editor</button>
      <button data-tab="mentor">AI Business Mentor</button>
      <button data-tab="taxai">AI Tax Advisor</button>
      <button data-tab="code">AI Code Editor</button>
      <button data-tab="automation">Automation</button>
      <button data-tab="market">Market Intelligence</button>
      <button data-tab="blueprint">The Blueprint</button>
      <button data-tab="freedom">Financial Freedom</button>
      <button data-tab="settings">Settings</button>
      <button id="logoutBtn">Logout</button>
    </aside>
    <section class="panel">
      <div id="tabs"></div>
    </section>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
